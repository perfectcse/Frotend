<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="music.png">
</head>
<body>

  <div class="player">

    <h2>🎵 Music Player</h2>

    <!-- Album Cover -->
    <div class="cover">
      <img id="coverImg" src="https://via.placeholder.com/200" alt="cover">
    </div>

    <!-- Song Title -->
    <h3 id="title">Song Name</h3>

    <audio id="audio"></audio>

    <!-- Controls -->
    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
    </div>

    <!-- Progress -->
    <div class="progress-container">
      <div class="progress" id="progress"></div>
    </div>

    <!-- Time -->
    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
