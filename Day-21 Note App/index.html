<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Notes App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h1>📝 Notes App</h1>

        <p>Create, manage and save your notes easily</p>

    </header>


    <!-- Main Container -->

    <main class="container">


        <!-- Add Note Form -->

        <section class="note-form">

            <h2>Add New Note</h2>

            <form id="noteForm">

                <input
                    type="text"
                    id="noteTitle"
                    placeholder="Enter note title"
                    required
                >

                <textarea
                    id="noteDescription"
                    placeholder="Write your note..."
                    rows="6"
                    required
                ></textarea>

                <button type="submit" id="addBtn">

                    Add Note

                </button>

            </form>

        </section>


        <!-- Search Notes -->

        <section class="search-section">

            <input
                type="text"
                id="search"
                placeholder="🔍 Search notes..."
            >

        </section>


        <!-- Notes Section -->

        <section class="notes-section">

            <h2>Your Notes</h2>

            <div id="notesContainer">

                <p class="empty">

                    No notes available. Add your first note! 📝

                </p>

            </div>

        </section>


    </main>


    <!-- Footer -->

    <footer>

        <p>

            © 2026 Notes App | Built by Vishal 🚀

        </p>

    </footer>


    <script src="script.js"></script>

</body>

</html>
