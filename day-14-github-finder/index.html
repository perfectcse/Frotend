<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GitHub Finder 🐙</title>

  <!-- SEO -->
  <meta name="description" content="Search GitHub profiles using GitHub Finder app">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔝 HEADER -->
  <header class="header">
    <h1>🐙 GitHub Finder</h1>

    <!-- 🔍 SEARCH FORM -->
    <form id="form" class="search-form">
      <input
        type="text"
        id="search"
        placeholder="Search GitHub user..."
        autocomplete="off"
        required
      >
    </form>
  </header>

  <!-- 📦 MAIN CONTENT -->
  <main class="container">

    <!-- Profile Section -->
    <section id="profile"></section>

  </main>

  <!-- 📌 FOOTER -->
  <footer class="footer">
    <p>© 2026 GitHub Finder | Built by Vishal 🚀</p>
  </footer>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
