<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>💰 Expense Tracker</h1>

    <!-- Balance Card -->
    <div class="balance-card">
      <p>Current Balance</p>
      <h2 id="balance">₹0</h2>
    </div>

    <!-- Income Expense -->
    <div class="summary">
      <div class="income">
        <p>Income</p>
        <h3 id="income">₹0</h3>
      </div>
      <div class="expense">
        <p>Expense</p>
        <h3 id="expense">₹0</h3>
      </div>
    </div>

    <!-- Form -->
    <div class="form">
      <input type="text" id="text" placeholder="Description">
      <input type="number" id="amount" placeholder="Amount (+income, -expense)">
      <input type="date" id="date">
      <button id="addBtn">Add Transaction</button>
    </div>

    <!-- History -->
    <div class="history">
      <h3>History</h3>
      <ul id="list"></ul>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
