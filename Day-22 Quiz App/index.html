<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>JavaScript Quiz App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h1>🧠 JavaScript Quiz</h1>

        <p>Test your JavaScript knowledge!</p>

    </header>


    <!-- Main Quiz Container -->

    <main class="quiz-container">

        <div class="quiz-card">


            <!-- Quiz Progress -->

            <div class="quiz-top">

                <span id="questionNumber">
                    Question 1 of 10
                </span>

                <span id="score">
                    Score: 0
                </span>

            </div>


            <!-- Progress Bar -->

            <div class="progress-container">

                <div
                    id="progressBar"
                    class="progress-bar"
                ></div>

            </div>


            <!-- Question Section -->

            <section id="quizSection">

                <h2 id="question">

                    Question will appear here

                </h2>


                <!-- Answer Buttons -->

                <div id="answerButtons">

                    <!-- Answers created by JavaScript -->

                </div>


                <!-- Next Button -->

                <button
                    id="nextBtn"
                    class="next-btn"
                >

                    Next Question ➡️

                </button>

            </section>


            <!-- Result Section -->

            <section
                id="resultSection"
                class="hidden"
            >

                <div class="result-icon">
                    🎉
                </div>

                <h2>
                    Quiz Completed!
                </h2>

                <p>
                    Your final score is:
                </p>

                <h3 id="finalScore">
                    0 / 10
                </h3>

                <p id="percentage">
                    0%
                </p>

                <p id="resultMessage">
                    Keep practicing!
                </p>

                <button
                    id="restartBtn"
                    class="restart-btn"
                >

                    🔄 Restart Quiz

                </button>

            </section>


        </div>

    </main>


    <!-- Footer -->

    <footer>

        <p>
            © 2026 JavaScript Quiz App | Built by Vishal 🚀
        </p>

    </footer>


    <script src="script.js"></script>

</body>

</html>
