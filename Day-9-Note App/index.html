<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>📝 Notes App</h2>
    <p class="subtitle">Write and save your notes</p>

    <!-- Note Input -->
    <div class="note-input">
      <textarea id="noteText" placeholder="Write your note here..."></textarea>
      <button id="addNote">Add Note</button>
    </div>

    <!-- Notes Counter -->
    <p id="noteCount" class="note-count"></p>

    <!-- Notes List -->
    <div id="notesContainer" class="notes-container"></div>

    <p class="footer">Happy Note Taking!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
